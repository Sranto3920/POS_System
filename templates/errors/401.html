{% extends "layouts/auth.html" %}

{% block title %}{{ t('error.401_title') }} — {{ t('app.name') }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-6" data-i18n="error.401_title">{{ t('error.401_title') }}</h1>
    <p class="text-muted" data-i18n="error.401_text">{{ t('error.401_text') }}</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
        <i class="bi bi-box-arrow-in-right"></i> <span data-i18n="auth.login">{{ t('auth.login') }}</span>
    </a>
</div>
{% endblock %}
