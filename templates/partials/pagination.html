{% if pagination and pagination.pages > 1 %}
<nav aria-label="Page navigation" class="mt-3">
    <ul class="pagination pagination-sm justify-content-center mb-0">
        <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.prev_num, q=search_q, **extra_args) }}">Previous</a>
        </li>
        {% for p in pagination.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
            {% if p %}
                <li class="page-item {% if p == pagination.page %}active{% endif %}">
                    <a class="page-link" href="{{ url_for(request.endpoint, page=p, q=search_q, **extra_args) }}">{{ p }}</a>
                </li>
            {% else %}
                <li class="page-item disabled"><span class="page-link">…</span></li>
            {% endif %}
        {% endfor %}
        <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
            <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.next_num, q=search_q, **extra_args) }}">Next</a>
        </li>
    </ul>
</nav>
{% endif %}
