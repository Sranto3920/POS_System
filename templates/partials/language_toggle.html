<div class="language-toggle" role="group" aria-label="{{ t('lang.toggle') }}">
    <button type="button" class="lang-switch-btn {% if current_lang == 'bn' %}active{% endif %}" data-lang="bn">
        🇧🇩 <span data-i18n="lang.bangla">{{ t('lang.bangla') }}</span>
    </button>
    <span class="lang-divider">|</span>
    <button type="button" class="lang-switch-btn {% if current_lang == 'en' %}active{% endif %}" data-lang="en">
        <span data-i18n="lang.english">{{ t('lang.english') }}</span>
    </button>
</div>
