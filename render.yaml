# Render Blueprint — see DEPLOY_RENDER.md (one free guide: Render + TiDB Cloud)

services:
  - type: web
    name: pos-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      # Set in Render dashboard — get from TiDB Cloud (see DEPLOY_RENDER.md)
      - key: DATABASE_URL
        sync: false
