# Render Blueprint — optional one-click deploy
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pos-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pos-mysql
          property: connectionString
    healthCheckPath: /login

databases:
  - name: pos-mysql
    plan: free
    databaseName: pos_inventory_db
    user: pos_user
